<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>
    <script>
    var a = +prompt('Pls enter A?','');
    switch (a){
        case 0:
        alert(0);
        break;
        case 1:
        alert(1);
        break;
        case 2:
        case 3:
        alert('2,3');
        break;
        default:
        alert('Введи цифру от 0 до 3');
        break;
    }
    </script>
</body>
</html>

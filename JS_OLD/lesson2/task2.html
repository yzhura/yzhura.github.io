<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lesson 2 Task 2</title>
</head>
<body>
    <script>
    var number = +prompt('Введите любое целое число');
    if(number < 0){
        alert('-1');
    } else if(number > 0) {
        alert('+1');
    } else if (number == 0){
        alert('0');
    } else {
        alert('Число а не слово');
    }
    </script>
</body>
</html>

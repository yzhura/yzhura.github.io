<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
    <form action="/">

        <b>Name:</b> <br>
        <input type="text" name="user_name" value=""> <br><br>
        
        <b>Email:</b> <br>
        <input type="email" name="email" value=""> <br><br>

        <b>Sex</b> <br>
        <input type="radio" id="sex1" name="sex">
        <label for="sex1">Male</label>
        <input type="radio" name="sex" id="sex2">
        <label for="sex2">Female</label>
        <br><br>
        
        <b>Current Status:</b><br>
        <input type="checkbox" name="status" value="s1">Student <br>
        <input type="checkbox" name="status" value="s2">Employed <br>
        <input type="checkbox" name="status" value="s3">Unemployed <br><br>

        <b>Month and Year of birth:</b> <br>
        <select name="day_birth">
            <option value="03">03</option>
            <option value="13">13</option>
            <option value="25">25</option>
        </select>
        <select name="year_birth">
            <option value="1994" selected="selected">1994</option>
            <option value="1995">1995</option>
            <option value="1996">1996</option>
        </select> <br> <br>
        
        <b>Skills and Technologies</b> <br>
        <select multiple name="skills" size="10">
            <optgroup label="Tech skills">
                <option value="html">HTML</option>
                <option value="CSS">CSS</option>
                <option value="javascript">JavaScript</option>
                <option value="git">Git</option>
            </optgroup>
            <optgroup label="Soft skills">
                <option value="management">Time management</option>
                <option value="proactivity">Proactivity</option>
                <option value="teamwork">TeamWork</option>
                <option value="leadership">Leadership</option>
            </optgroup> 
        </select> <br><br>

        <b>Photo</b> <br>
        <input type="file"> <br><br>

        <b>Comment</b><br>
        <textarea name="comment" id="" cols="30" rows="10"></textarea>
        <br><br>

        <input type="button" value="Save">
        
        
    </form>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
</head>
<body>
    <script>
    function pow(x,n){
        var result = x;
        for (var i=1;i<n;i++){
            result *= x;
        }
        return result;
    }
    alert(pow(3,2));
    alert(pow(1,100));
    </script>
</body>
</html>

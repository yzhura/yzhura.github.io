<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Title</title>
    <script src="./js/jquery-3.5.1.min.js" defer></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-Piv4xVNRyMGpqkS2by6br4gNJ7DXjqk09RmUpJ8jgGtD7zP9yug3goQfGII0yAns" crossorigin="anonymous" defer></script>
    <link rel="stylesheet" href="https://bootswatch.com/4/journal/bootstrap.min.css">
    <script src="./js/main.js" defer></script>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <div id="wrapper">
        <div id="main">
            <div class="create-event-section pt-5 pb-5">
                <div class="container position-relative">
                    <h1 class="text-center mb-5 display-4 ">Create Event</h1>
                    <form class="create-event-form ml-auto mr-auto">
                        <fieldset>
                            <div class="form-group">
                                <div class="row">
                                    <div class="col-lg-2">
                                        <label class="col-form-label" for="event-input">Name of event:</label>
                                    </div>
                                    <div class="col-lg-10">
                                        <input type="text" class="form-control event-input" placeholder="Event name" id="event-input">
                                        <div class="invalid-feedback">Type name of event, please :)</div>
                                    </div>
                                </div>
                              </div>
                              <div class="form-group">
                                  <div class="row">
                                      <div class="col-lg-2">
                                          <label class="col-form-label" for="participants-select">Participants:</label>
                                        </div>
                                        <div class="col-lg-10">
                                          <select class="custom-select participants-select"></select>
                                        </div>
                                  </div>
                              </div>
                              <div class="form-group">
                                  <div class="row">
                                      <div class="col-lg-2">
                                          <label class="col-form-label" for="days-select">Day:</label>
                                      </div>
                                      <div class="col-lg-10">
                                        <select class="custom-select days-select"></select>
                                      </div>
                                  </div>
                              </div>
                              <div class="form-group">
                                  <div class="row">
                                      <div class="col-lg-2">
                                          <label class="col-form-label" for="time-select">Time:</label>
                                      </div>
                                      <div class="col-lg-10">
                                        <select class="custom-select time-select"></select>
                                      </div>
                                  </div>
                              </div>
                              <div class="btns-list d-flex justify-content-md-end justify-content-center">
                                  <a href="./calendar.html" class="btn btn-secondary">Cancel</a>
                                  <button type="submit" class="btn btn-primary ml-3">Create</button>
                              </div>
                        </fieldset>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Title</title>
    <script src="./js/jquery-3.5.1.min.js" defer></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-Piv4xVNRyMGpqkS2by6br4gNJ7DXjqk09RmUpJ8jgGtD7zP9yug3goQfGII0yAns" crossorigin="anonymous" defer></script>
    <link rel="stylesheet" href="https://bootswatch.com/4/journal/bootstrap.min.css">
    <script src="./js/main.js" defer></script>
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <div id="wrapper">
        <main id="main" class="pt-5 pb-5">
            <section class="calendar-header pt-3 pb-3">
                <div class="container">
                    <h1 class="text-center mb-5 display-4">Weekly Calendar</h1>
                    <div class="row align-items-center">
                        <div class="col-12 col-md-4 text-center text-md-left">
                            <h2 class="mb-md-0">Today: <span class="day text-primary"></span></h2>
                        </div>
                        <div class="col-12 col-md-4">
                            <p class="current-time-text text-center mb-md-0 ">Time: <span class="current-time text-primary">13:00</span></p>
                        </div>
                        <div class="col-12 col-md-4">
                            <fieldset class="d-flex justify-content-md-end justify-content-center align-items-center p-0">
                                <div class="form-group mb-0 mr-3">
                                    <select class="custom-select participants-select filter-participants-select">
                                    </select>
                                </div>
                                <a href="./create-event.html"  class="btn btn-primary text-nowrap">New event +</a>
                            </fieldset>
                        </div>
                    </div>
                </div>
             </section>
            <section class="calendar-section">
                <div class="container">
                    <div class="row">
                        <div class="col">
                            <div class="table-responsive">
                                <table class="table calendar-table text-center mb-5">
                                    <thead class="thead-calendar-table">
                                      <tr>
                                        <th scope="col">Day / Time</th>
                                        <th scope="col">Mon</th>
                                        <th scope="col">Tue</th>
                                        <th scope="col">Wed</th>
                                        <th scope="col">Thu</th>
                                        <th scope="col">Fri</th>
                                      </tr>
                                    </thead>
                                    <tbody class="tbody-calendar-table">
                                      
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-12">
                            <h4 class="mb-4">Meetings on this week: <span class="text-primary meetings-counter"></span></h4>
                        </div>
                        <div class="col-12">
                            <h4 class="days-left-text">Left <span class="days-left text-primary"></span> working days to weekend</h4>
                            <div class="progress">
                                <div class="progress-bar progress-bar-striped" role="progressbar" style="width: 0%;" aria-valuenow="1" aria-valuemin="0" aria-valuemax="5"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
